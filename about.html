<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me | Dumeili</title>
  <style>
    :root {
      --text: #121a24;
      --muted: #5a6676;
      --line: rgba(18, 26, 36, 0.1);
      --surface: rgba(255, 255, 255, 0.88);
      --surface-strong: rgba(255, 255, 255, 0.94);
      --chip: rgba(255, 255, 255, 0.82);
      --accent: #1574f5;
      --accent-soft: rgba(21, 116, 245, 0.12);
      --shadow: 0 24px 55px rgba(21, 37, 58, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "SF Pro Display", "Avenir Next", "Helvetica Neue", "Segoe UI", sans-serif;
      background:
        radial-gradient(900px 500px at 8% -6%, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.24) 52%, transparent 74%),
        radial-gradient(880px 560px at 94% 0%, rgba(21, 116, 245, 0.18) 0%, rgba(21, 116, 245, 0.03) 58%, transparent 80%),
        linear-gradient(160deg, #edf2f7 0%, #e7edf4 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(150deg, var(--surface-strong), var(--surface));
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: panel-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .head {
      border-bottom: 1px solid var(--line);
      padding: 28px 30px 24px;
      background: rgba(255, 255, 255, 0.56);
    }

    h1 {
      font-size: clamp(2rem, 4.6vw, 3.3rem);
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.6;
      max-width: 700px;
    }

    .body {
      padding: 26px 30px 28px;
      display: grid;
      gap: 18px;
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: 620;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .md-list {
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .md-list li {
      border: 1px solid var(--line);
      background: var(--chip);
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.65;
      font-size: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: slide-up 0.7s both;
    }

    .md-list li::before {
      content: "-";
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-soft);
      transform: translateY(1px);
    }

    .key {
      color: var(--muted);
      min-width: 128px;
      font-weight: 560;
    }

    .value {
      color: var(--text);
      font-weight: 520;
      flex: 1;
    }

    .actions {
      padding: 0 30px 28px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 0.92rem;
      background: rgba(255, 255, 255, 0.78);
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    }

    a:hover {
      transform: translateY(-2px);
      border-color: rgba(21, 116, 245, 0.42);
      background: rgba(255, 255, 255, 0.94);
    }

    @keyframes panel-in {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 760px) {
      body { padding: 14px; }

      .head { padding: 22px 18px 18px; }

      .body { padding: 18px; }

      .md-list li {
        flex-direction: column;
        gap: 4px;
      }

      .key { min-width: 0; }

      .actions { padding: 0 18px 20px; }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="About page">
    <header class="head">
      <h1>About Me</h1>
    </header>

    <section class="body" aria-label="Profile details">
      <ul class="md-list">
        <li>
          <span class="key">Name</span>
          <span class="value">Dumeili</span>
        </li>
        <li>
          <span class="key">School</span>
          <span class="value">Shanghai Jiao Tong University (SJTU)</span>
        </li>
        <li>
          <span class="key">Major</span>
          <span class="value">Information Engineering</span>
        </li>
        <li>
          <span class="key">Scholarship</span>
          <span class="value">2024 and 2025 Zhiyuan Honor Scholarship of Shanghai Jiao Tong University</span>
        </li>
        <li>
          <span class="key">Hobby</span>
          <span class="value">Rhythm games, badminton, and shojo band</span>
        </li>
      </ul>
    </section>

    <div class="actions">
      <a href="index.html">Back to Home</a>
      <a href="my-bot.html">Go to My Bot</a>
    </div>
  </main>
</body>
</html>
